[build-system]
requires = ["maturin>=1.14,<2.0"]
build-backend = "maturin"

[project]
name = "pynumaflow-lite"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]
dynamic = ["version"]
[tool.maturin]
features = ["pyo3/extension-module"]

[tool.ruff]
line-length = 119
src = ["pynumaflow_lite", "tests", "manifests"]
target-version = "py310"
show-fixes = true

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "PT",  # flake8-pytest-style
    "RUF",  # Ruff-specific rules
    "PERF",  # Perflint performance rules
    "SIM",  # flake8-simplify
    "RET",  # flake8-return
    "TID",  # flake8-tidy-imports
    "PGH",  # pygrep-hooks
    "ASYNC",  # flake8-async
    "PIE794",  # duplicate class field definitions
]
ignore = [
    "E501",  # line too long
]

[tool.ruff.lint.isort]
known-first-party = ["pynumaflow_lite"]
combine-as-imports = true

[tool.ruff.lint.per-file-ignores]
"**/*.pyi" = [
    "UP006",  # keep typing.List-style annotations in stubs for now
]

[tool.ruff.format]
docstring-code-format = true

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "ruff>=0.15.20",
    "maturin>=1.14,<2.0",
]
