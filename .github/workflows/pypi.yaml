name: PyPi Publish

on:
  pull_request:
    branches: [ "main" ]
  push:
    tags:
      - v*
jobs:
  pypi_publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pynumaflow/
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10" ]

    name: Publish to PyPi
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Build dist
        run: uv build

      - name: Publish
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.repository == 'numaproj/numaflow-python'
        run: uv publish --token ${{ secrets.PYPI_PASSWORD }}
