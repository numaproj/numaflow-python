apiVersion: numaflow.numaproj.io/v1alpha1
kind: Pipeline
metadata:
  name: udsink-pipeline
spec:
  vertices:
    - name: in
      source:
        generator:
          rpu: 1
          duration: 1s
          msgSize: 10
    - name: out
      sink:
        udsink:
          container:
            args:
            - python
            - example.py
            image: quay.io/numaio/numaflow-python/sink-log:stable
            imagePullPolicy: IfNotPresent
            env:
              - name: PYTHONDEBUG
                value: "true"
              - name: INVOKE
                value: "func_handler"
  edges:
    - from: in
      to: out
