[package]
name = "pynumaflow-lite"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "pynumaflow_lite"
crate-type = ["cdylib", "rlib"]

[dependencies]
numaflow = { git = "https://github.com/numaproj/numaflow-rs.git", rev = "de2fdc16da2f2bfb12ee04050e6e60c809692c2c" }
pyo3 = { version = "0.29.0", features = ["chrono", "experimental-inspect"] }
tokio = "1.52.3"
tonic = "0.14.6"
tokio-stream = "0.1.18"
tower = "0.5.3"
hyper-util = "0.1.20"
prost-types = "0.14.4"
chrono = "0.4.45"
pyo3-async-runtimes = { version = "0.29.0", features = ["tokio-runtime"] }
futures-core = "0.3.32"
pin-project = "1.1.13"

## Binaries for testing

[[bin]]
name = "test_map"
path = "tests/bin/map.rs"

[[bin]]
name = "test_batchmap"
path = "tests/bin/batchmap.rs"

[[bin]]
name = "test_mapstream"
path = "tests/bin/mapstream.rs"

[[bin]]
name = "test_reduce"
path = "tests/bin/reduce.rs"

[[bin]]
name = "test_session_reduce"
path = "tests/bin/session_reduce.rs"

[[bin]]
name = "test_accumulator"
path = "tests/bin/accumulator.rs"

[[bin]]
name = "test_reducestream"
path = "tests/bin/reducestream.rs"

[[bin]]
name = "test_sink"
path = "tests/bin/sink.rs"

[[bin]]
name = "test_source"
path = "tests/bin/source.rs"

[[bin]]
name = "test_sourcetransform"
path = "tests/bin/sourcetransform.rs"

[[bin]]
name = "test_sideinput"
path = "tests/bin/sideinput.rs"
